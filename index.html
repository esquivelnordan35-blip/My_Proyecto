<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Proyecto</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
      text-align: center;
      padding: 60px 20px;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }
    .card {
      background: rgba(0,0,0,0.25);
      padding: 24px;
      border-radius: 14px;
      display: inline-block;
      max-width: 500px;
    }
    p {
      font-size: 22px;
      margin: 12px 0;
    }
  </style>
</head>
<body>
  <h1>Mi Proyecto 🚀</h1>
  <div class="card">
    <p>¡Hola mundo!</p>
    <p>Proyecto de clase</p>
    <p>Creado por Fernando 👨‍🏫</p>
  </div>
</body>
</html>
